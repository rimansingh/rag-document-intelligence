name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-deploy.yml

  pull_request:
    branches: [main]
    paths:
      - backend/**

jobs:

  # ── Job 1: Tests ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run pytest
        env:
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          ENVIRONMENT:   test
          CHROMA_PATH:   ./test_chroma_db
        run: |
          cd backend
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/test-results.xml

  # ── Job 2: Security scan ──────────────────────────────────────────────
  security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t rag-backend:${{ github.sha }} \
            ./backend

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Save scan results on failure
        if: failure()
        run: |
          echo "Trivy scan found vulnerabilities — check output above"

  # ── Job 3: Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to HuggingFace
    runs-on: ubuntu-latest
    needs: [test, security]

    # Only deploy on push to main — not on pull requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

      - name: Push backend to HuggingFace Space
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          # Clone the HF Space
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/rag-backend hf-backend

          # Copy backend files into it
          cp -r backend/app       hf-backend/
          cp    backend/Dockerfile hf-backend/
          cp    backend/requirements.txt hf-backend/

          # Commit and push
          cd hf-backend
          git add .
          git diff --staged --quiet || git commit -m "deploy: ${{ github.sha }}"
          git push

      - name: Verify deployment health
        run: |
          echo "Waiting 60s for Space to rebuild..."
          sleep 60
          curl --fail --retry 5 --retry-delay 15 \
            https://${{ secrets.HF_USERNAME }}-rag-backend.hf.space/health \
            && echo "Backend healthy" \
            || echo "Health check failed — Space may still be building"