name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-deploy.yml

jobs:

  deploy:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push frontend to HuggingFace Space
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          git clone https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/rag-frontend hf-frontend

          cp frontend/app.py           hf-frontend/app.py
          cp frontend/requirements.txt hf-frontend/requirements.txt

          cd hf-frontend
          git add .
          git diff --staged --quiet || git commit -m "deploy: ${{ github.sha }}"
          git push

      - name: Confirm deployment
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          echo "Frontend deployed at:"
          echo "https://huggingface.co/spaces/${HF_USERNAME}/rag-frontend"