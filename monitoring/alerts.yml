groups:
  - name: rag_alerts
    rules:

      # Alert if backend goes down
      - alert: RAGBackendDown
        expr: up{job="rag-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RAG backend is down"
          description: "The RAG backend has been unreachable for more than 1 minute."

      # Alert if p95 latency exceeds 10 seconds
      - alert: HighLatency
        expr: >
          histogram_quantile(0.95,
            rate(rag_request_duration_seconds_bucket[5m])
          ) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency detected"
          description: "p95 response time has exceeded 10s for 2 minutes."

      # Alert if error rate exceeds 10%
      - alert: HighErrorRate
        expr: >
          rate(rag_requests_total{status="error"}[5m])
          /
          rate(rag_requests_total[5m])
          > 0.10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate"
          description: "More than 10% of requests are failing."